name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --clean --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Verify iOS workspace
        run: |
          ls ios

      - name: Build iOS Archive
        run: |
          cd ios

          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" | head -n 1)

          echo "Workspace: $WORKSPACE"

          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | awk '/Schemes:/{flag=1; next} flag && NF{print $1; exit}')

          echo "Scheme: $SCHEME"

          if [ -z "$WORKSPACE" ] || [ -z "$SCHEME" ]; then
            echo "❌ Missing workspace or scheme"
            exit 1
          fi

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/app.xcarchive \
            archive

      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build/app.xcarchive
