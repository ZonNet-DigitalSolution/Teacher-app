name: iOS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Get workspace and scheme
        run: |
          ls ios
          xcodebuild -list -workspace ios/*.xcworkspace

      - name: Build iOS Archive
        run: |
          cd ios
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme $(xcodebuild -list -workspace *.xcworkspace | awk '/Schemes:/ {getline; print $1}') \
            -configuration Release \
            -archivePath build/app.xcarchive \
            archive

      - name: Export IPA (optional)
        run: |
          cd ios
          mkdir -p build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build/app.xcarchive
